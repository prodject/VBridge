name: Build Unsigned IPA and Publish Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    timeout-minutes: 90

    env:
      XCODE_PROJECT: TurnBridge.xcodeproj
      XCODE_TARGET: VBridge
      XCODE_CONFIGURATION: Release
      XCODE_SDK: iphoneos
      # GitHub-hosted Xcode 16.4 supports iOS deployment targets only up to 18.5.99.
      # Keep the repo's local project settings as-is, but build the CI artifact with
      # the highest target supported by the runner toolchain.
      IPHONEOS_DEPLOYMENT_TARGET: "18.5"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: wireguard-apple/Sources/WireGuardKitGo/go.sum

      - name: Cache WireGuard Go bridge
        uses: actions/cache@v4
        with:
          path: |
            wireguard-apple/Sources/WireGuardKitGo/out
          key: wireguard-go-bridge-${{ runner.os }}-${{ hashFiles('wireguard-apple/Sources/WireGuardKitGo/go.mod', 'wireguard-apple/Sources/WireGuardKitGo/go.sum', 'wireguard-apple/Sources/WireGuardKitGo/*.go', 'wireguard-apple/Sources/WireGuardKitGo/Makefile') }}

      - name: Show toolchain
        run: |
          xcodebuild -version
          go version

      - name: Compute CI app version
        run: |
          set -euo pipefail
          APP_MINOR=$((GITHUB_RUN_NUMBER + GITHUB_RUN_ATTEMPT - 1))
          APP_VERSION="1.${APP_MINOR}"
          APP_BUILD="${APP_MINOR}"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "APP_BUILD=$APP_BUILD" >> "$GITHUB_ENV"
          echo "CI app version: $APP_VERSION ($APP_BUILD)"

      - name: Prebuild WireGuard Go bridge
        run: |
          set -euo pipefail
          PLATFORM_NAME=iphoneos \
          ARCHS=arm64 \
          IPHONEOS_DEPLOYMENT_TARGET="$IPHONEOS_DEPLOYMENT_TARGET" \
          ./script/build_wireguard_go_bridge.sh
          test -f wireguard-apple/Sources/WireGuardKitGo/out/libwg-go.a
          test -f wireguard-apple/Sources/WireGuardKitGo/out/wireguard-go-version.h

      - name: Build app
        run: |
          set -euo pipefail

          xcodebuild \
            -project "$XCODE_PROJECT" \
            -target "$XCODE_TARGET" \
            -configuration "$XCODE_CONFIGURATION" \
            -sdk "$XCODE_SDK" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            IPHONEOS_DEPLOYMENT_TARGET="$IPHONEOS_DEPLOYMENT_TARGET" \
            MARKETING_VERSION="$APP_VERSION" \
            CURRENT_PROJECT_VERSION="$APP_BUILD" \
            build

      - name: Ad-hoc sign app bundle with entitlements
        run: |
          set -euo pipefail

          APP_PATH="$GITHUB_WORKSPACE/build/${XCODE_CONFIGURATION}-iphoneos/VBridge.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH="$(find "$HOME/Library/Developer/Xcode/DerivedData" -path "*/Build/Products/${XCODE_CONFIGURATION}-iphoneos/VBridge.app" -print -quit)"
          fi

          test -n "$APP_PATH"
          test -d "$APP_PATH"

          sign_if_signable() {
            local path="$1"
            if [ -e "$path" ]; then
              /usr/bin/codesign --force --sign - --timestamp=none "$path"
            fi
          }

          sign_bundle() {
            local bundle_path="$1"
            local entitlements_path="$2"

            if [ -d "$bundle_path/Frameworks" ]; then
              while IFS= read -r framework; do
                sign_if_signable "$framework"
              done < <(find "$bundle_path/Frameworks" -type d -name "*.framework")

              while IFS= read -r dylib; do
                sign_if_signable "$dylib"
              done < <(find "$bundle_path/Frameworks" -type f -name "*.dylib")
            fi

            /usr/bin/codesign \
              --force \
              --sign - \
              --timestamp=none \
              --entitlements "$entitlements_path" \
              "$bundle_path"
          }

          if [ -d "$APP_PATH/PlugIns/network-extension.appex" ]; then
            sign_bundle "$APP_PATH/PlugIns/network-extension.appex" "network-extension/network_extension.entitlements"
          fi
          if [ -d "$APP_PATH/PlugIns/VBridgeWidgetExtension.appex" ]; then
            sign_bundle "$APP_PATH/PlugIns/VBridgeWidgetExtension.appex" "WidgetExtension/WidgetExtension.entitlements"
          fi
          sign_bundle "$APP_PATH" "TurnBridge/TurnBridge.entitlements"

          echo "App entitlements:"
          /usr/bin/codesign -d --entitlements :- "$APP_PATH" 2>/dev/null || true
          if [ -d "$APP_PATH/PlugIns/network-extension.appex" ]; then
            echo "Network extension entitlements:"
            /usr/bin/codesign -d --entitlements :- "$APP_PATH/PlugIns/network-extension.appex" 2>/dev/null || true
          fi
          if [ -d "$APP_PATH/PlugIns/VBridgeWidgetExtension.appex" ]; then
            echo "Widget extension entitlements:"
            /usr/bin/codesign -d --entitlements :- "$APP_PATH/PlugIns/VBridgeWidgetExtension.appex" 2>/dev/null || true
          fi

      - name: Package unsigned IPA
        id: package
        run: |
          set -euo pipefail

          APP_PATH="$GITHUB_WORKSPACE/build/${XCODE_CONFIGURATION}-iphoneos/VBridge.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=""
          fi
          if [ -z "$APP_PATH" ]; then
            APP_PATH="$(find "$HOME/Library/Developer/Xcode/DerivedData" -path "*/Build/Products/${XCODE_CONFIGURATION}-iphoneos/VBridge.app" -print -quit)"
          fi

          test -n "$APP_PATH"
          test -d "$APP_PATH"

          APP_VERSION="$(/usr/libexec/PlistBuddy -c 'Print CFBundleShortVersionString' "$APP_PATH/Info.plist")"
          APP_BUILD="$(/usr/libexec/PlistBuddy -c 'Print CFBundleVersion' "$APP_PATH/Info.plist")"
          IPA_FILENAME="vbridge-${GITHUB_SHA}-${APP_VERSION}.ipa"
          IPA_PATH="${GITHUB_WORKSPACE}/${IPA_FILENAME}"

          PACKAGE_ROOT="$(mktemp -d)"
          mkdir -p "$PACKAGE_ROOT/Payload"
          ditto "$APP_PATH" "$PACKAGE_ROOT/Payload/VBridge.app"
          (cd "$PACKAGE_ROOT" && ditto -c -k --sequesterRsrc --keepParent Payload "$IPA_PATH")

          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "app_build=$APP_BUILD" >> "$GITHUB_OUTPUT"
          echo "ipa_filename=$IPA_FILENAME" >> "$GITHUB_OUTPUT"
          echo "ipa_path=$IPA_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.ipa_filename }}
          path: ${{ steps.package.outputs.ipa_path }}
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: vbridge-${{ steps.package.outputs.app_version }}-${{ github.sha }}
          name: VBridge ${{ steps.package.outputs.app_version }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: false
          body: |
            Automated unsigned IPA build for commit `${{ github.sha }}`.

            App version: `${{ steps.package.outputs.app_version }}`
            Build number: `${{ steps.package.outputs.app_build }}`
            Build target: iOS ${{ env.IPHONEOS_DEPLOYMENT_TARGET }}
            Artifact: `${{ steps.package.outputs.ipa_filename }}`
          files: ${{ steps.package.outputs.ipa_path }}
